<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 96" width="360" height="96" role="img" aria-label="Surfaced HTX">
  <!-- MARK: an arrow breaking the surface line (faint below, solid above) -->
  <g transform="translate(8,16)">
    <!-- surface line -->
    <line x1="6" y1="40" x2="58" y2="40" stroke="#33404D" stroke-width="3" stroke-linecap="round"/>
    <!-- below-surface shaft (faint) -->
    <line x1="32" y1="54" x2="32" y2="40" stroke="#E2600F" stroke-width="5" stroke-linecap="round" opacity="0.28"/>
    <!-- above-surface shaft (solid) -->
    <line x1="32" y1="40" x2="32" y2="26" stroke="#E2600F" stroke-width="6" stroke-linecap="round"/>
    <!-- arrowhead -->
    <path d="M32 8 L45 26 L19 26 Z" fill="#E2600F"/>
  </g>
  <!-- WORDMARK -->
  <text x="92" y="60" font-family="'Helvetica Neue',Arial,sans-serif" font-size="42" font-weight="800" letter-spacing="-0.5" fill="#16181B">Surfaced</text>
  <!-- CITY CHIP (swap HTX per market) -->
  <g transform="translate(278,32)">
    <rect x="0" y="0" width="66" height="32" rx="6" fill="#E2600F"/>
    <text x="33" y="22" text-anchor="middle" font-family="'Helvetica Neue',Arial,sans-serif" font-size="19" font-weight="800" letter-spacing="1" fill="#FFFFFF">HTX</text>
  </g>
</svg>
